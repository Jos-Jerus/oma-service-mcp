---
kind: Template
apiVersion: template.openshift.io/v1
metadata:
  name: oma-service-mcp
labels:
  app: oma-service-mcp
parameters:
  - name: IMAGE
    description: Container image repository
    required: true
  - name: IMAGE_TAG
    description: Container image tag
    required: true
  - name: REPLICAS
    description: Number of replicas
    value: "1"
  - name: MIGRATION_PLANNER_URL
    description: Migration Planner API base URL
    value: "http://migration-planner:7443"
  - name: AUTH_TYPE
    description: Auth mode (forwarded or none)
    value: "forwarded"
  - name: CPU_REQUEST
    description: CPU request
    value: "100m"
  - name: CPU_LIMIT
    description: CPU limit
    value: "500m"
  - name: MEMORY_REQUEST
    description: Memory request
    value: "128Mi"
  - name: MEMORY_LIMIT
    description: Memory limit
    value: "256Mi"

objects:
  - kind: ConfigMap
    apiVersion: v1
    metadata:
      name: oma-service-mcp-config
      labels:
        app: oma-service-mcp
    data:
      migration-planner-url: ${MIGRATION_PLANNER_URL}
      auth-type: ${AUTH_TYPE}

  - kind: Service
    apiVersion: v1
    metadata:
      name: oma-service-mcp
      labels:
        app: oma-service-mcp
    spec:
      selector:
        app: oma-service-mcp
      ports:
        - name: http
          port: 8000
          targetPort: 8000
          protocol: TCP
      type: ClusterIP

  - kind: Deployment
    apiVersion: apps/v1
    metadata:
      name: oma-service-mcp
      labels:
        app: oma-service-mcp
    spec:
      replicas: ${{REPLICAS}}
      selector:
        matchLabels:
          app: oma-service-mcp
      template:
        metadata:
          labels:
            app: oma-service-mcp
        spec:
          containers:
            - name: oma-service-mcp
              image: ${IMAGE}:${IMAGE_TAG}
              ports:
                - containerPort: 8000
                  protocol: TCP
              env:
                - name: MCP_HOST
                  value: "0.0.0.0"
                - name: MCP_PORT
                  value: "8000"
                - name: TRANSPORT
                  value: "streamable-http"
                - name: LOG_TO_FILE
                  value: "false"
                - name: MIGRATION_PLANNER_URL
                  valueFrom:
                    configMapKeyRef:
                      name: oma-service-mcp-config
                      key: migration-planner-url
                - name: AUTH_TYPE
                  valueFrom:
                    configMapKeyRef:
                      name: oma-service-mcp-config
                      key: auth-type
              resources:
                requests:
                  cpu: ${CPU_REQUEST}
                  memory: ${MEMORY_REQUEST}
                limits:
                  cpu: ${CPU_LIMIT}
                  memory: ${MEMORY_LIMIT}
              readinessProbe:
                httpGet:
                  path: /health
                  port: 8000
                initialDelaySeconds: 5
                periodSeconds: 10
              livenessProbe:
                httpGet:
                  path: /health
                  port: 8000
                initialDelaySeconds: 10
                periodSeconds: 30
