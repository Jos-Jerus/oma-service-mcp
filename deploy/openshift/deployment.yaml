apiVersion: apps/v1
kind: Deployment
metadata:
  name: oma-service-mcp
  labels:
    app: oma-service-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oma-service-mcp
  template:
    metadata:
      labels:
        app: oma-service-mcp
    spec:
      containers:
        - name: oma-service-mcp
          image: quay.io/oma/oma-service-mcp:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: MCP_HOST
              value: "0.0.0.0"
            - name: MCP_PORT
              value: "8000"
            - name: TRANSPORT
              value: "streamable-http"
            - name: LOG_TO_FILE
              value: "false"
            - name: MIGRATION_PLANNER_URL
              valueFrom:
                configMapKeyRef:
                  name: oma-service-mcp-config
                  key: migration-planner-url
            - name: AUTH_TYPE
              valueFrom:
                configMapKeyRef:
                  name: oma-service-mcp-config
                  key: auth-type
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
